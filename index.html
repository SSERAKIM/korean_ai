<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>낱말 요리 타이쿤</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face { font-family: 'DosMyungjo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_eight@1.0/DOSMyungjo.woff') format('woff'); font-weight: normal; }
        @font-face { font-family: 'Mona12emoji'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2603-1@1.0/Mona12Emoji.woff2') format('woff2'); font-weight: normal; }
        * { font-family: 'DosMyungjo', 'Mona12emoji', sans-serif !important; font-weight: normal !important; }
        body { background-color: #FFFFFF; margin: 0; image-rendering: pixelated; overflow-y: auto; overflow-x: hidden; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        .animate-shake { animation: shake 0.2s ease-in-out infinite; }
        @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-bounce-slow { animation: bounce-slow 1s ease-in-out infinite; }
        .pixelated { image-rendering: pixelated; }
        
        /* 캔버스와 동일한 배치를 보장하는 16:9 절대 비율 컨테이너 */
        .game-board {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border-radius: 0.5rem;
            background-color: #f8fafc;
        }

        /* 배경 이미지를 16:9 공간에 가득 채우고 스케일/위치를 고정 */
        .game-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }
        .bg-skewer { transform: scale(1.15) translateY(-5%); }
        .bg-shabu { transform: scale(1.05) translateY(5%); }

        /* 화면 크기에 맞춰 글자 크기 유동적 조절 */
        .text-slot { font-size: clamp(0.7rem, 1.6vw, 1.2rem); }
        .text-label { font-size: clamp(0.6rem, 1.2vw, 1rem); }
        .text-title { font-size: clamp(1rem, 2vw, 1.5rem); }
        .responsive-text-base { font-size: clamp(0.85rem, 1.5vw, 1.1rem); }
        .responsive-text-sm { font-size: clamp(0.7rem, 1.2vw, 1rem); }

        /* 공통 버튼 디자인 */
        .slot-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-width: 2px;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* 빈 칸 박스 크기 및 가동 범위 제한 */
        .skewer-slot { width: 13%; height: 22%; max-width: 115px; max-height: 95px; }
    </style>
</head>
<body>
    <div id="root">
        <div style="display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; font-size:1.5rem; font-weight:bold;">
            👨‍🍳 요리 재료를 준비 중입니다... 잠시만 기다려주세요!
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 완벽히 동기화된 전체 문제 데이터베이스 (16종) ---
        const QUIZ_DATA = {
          enumeration: [
            { id: 'e1', topic: '우리나라의 전통 놀이', slots: [{ id: 's1', answer: '제기차기' }, { id: 's2', answer: '윷놀이' }, { id: 's3', answer: '투호' }, { id: 's4', answer: '널뛰기' }], distractors: ['스마트폰 게임', '체스', '축구'] },
            { id: 'e2', topic: '태양계의 행성', slots: [{ id: 's1', answer: '수성' }, { id: 's2', answer: '금성' }, { id: 's3', answer: '지구' }, { id: 's4', answer: '화성' }], distractors: ['태양', '달', '안드로메다'] },
            { id: 'e3', topic: '곤충', slots: [{ id: 's1', answer: '매미' }, { id: 's2', answer: '잠자리' }, { id: 's3', answer: '사슴벌레' }, { id: 's4', answer: '장수풍뎅이' }], distractors: ['고래', '사자', '펭귄'] },
            { id: 'e4', topic: '학용품의 종류', slots: [{ id: 's1', answer: '연필' }, { id: 's2', answer: '지우개' }, { id: 's3', answer: '자' }, { id: 's4', answer: '필통' }], distractors: ['프라이팬', '침대', '칫솔'] },
            { id: 'e5', topic: '겨울에 볼 수 있는 것', slots: [{ id: 's1', answer: '눈사람' }, { id: 's2', answer: '군고구마' }, { id: 's3', answer: '목도리' }, { id: 's4', answer: '썰매' }], distractors: ['반팔 티셔츠', '수박', '선풍기'] },
            { id: 'e6', topic: '현악기의 종류', slots: [{ id: 's1', answer: '바이올린' }, { id: 's2', answer: '첼로' }, { id: 's3', answer: '가야금' }, { id: 's4', answer: '거문고' }], distractors: ['트럼펫', '드럼', '피리'] },
            { id: 'e7', topic: '우리나라의 광역시', slots: [{ id: 's1', answer: '부산' }, { id: 's2', answer: '대구' }, { id: 's3', answer: '인천' }, { id: 's4', answer: '광주' }], distractors: ['서울', '제주', '도쿄', '대전'] },
            { id: 'e8', topic: '에너지 절약 방법', slots: [{ id: 's1', answer: '전등 끄기' }, { id: 's2', answer: '코드 뽑기' }, { id: 's3', answer: '계단 이용' }, { id: 's4', answer: '물 아껴 쓰기' }], distractors: ['에어컨 종일 켜기', '빨래 조금씩 자주 하기'] }
          ],
          comparison: [
            { id: 'c1', targets: ['버스', '지하철'], slots: [{ id: 'common1', answer: '대중교통 수단이다' }, { id: 'common2', answer: '많은 사람이 이용한다' }, { id: 'diffA', answer: '도로 위를 달린다' }, { id: 'diffB', answer: '지하 선로를 이용한다' }], distractors: ['하늘을 날아다닌다', '개인이 소유하는 자가용', '우주로 나가는 발사체'] },
            { id: 'c2', targets: ['도서관', '서점'], slots: [{ id: 'common1', answer: '책이 아주 많다' }, { id: 'common2', answer: '조용히 해야 하는 장소이다' }, { id: 'diffA', answer: '무료로 책을 빌려준다' }, { id: 'diffB', answer: '돈을 내고 책을 산다' }], distractors: ['음식을 요리해서 판다', '운동경기를 관람하는 곳', '영화를 상영하는 극장'] },
            { id: 'c3', targets: ['축구', '농구'], slots: [{ id: 'common1', answer: '공을 사용하는 운동이다' }, { id: 'common2', answer: '팀을 나누어 경기를 한다' }, { id: 'diffA', answer: '주로 발로 공을 찬다' }, { id: 'diffB', answer: '주로 손으로 공을 던진다' }], distractors: ['물속에서 하는 운동이다', '혼자서만 즐기는 스포츠', '얼음 위에서 타는 스케이트'] },
            { id: 'c4', targets: ['지구', '달'], slots: [{ id: 'common1', answer: '우주에 있는 천체이다' }, { id: 'common2', answer: '둥근 모양을 하고 있다' }, { id: 'diffA', answer: '생명체가 살고 있다' }, { id: 'diffB', answer: '지구의 주위를 도는 위성이다' }], distractors: ['사람이 만든 인공물이다', '눈이 부시게 빛나는 항성', '사각형의 평평한 모양'] },
            { id: 'c5', targets: ['연필', '샤프'], slots: [{ id: 'common1', answer: '글씨를 쓰는 도구이다' }, { id: 'common2', answer: '공부할 때 주로 사용한다' }, { id: 'diffA', answer: '나무로 만들어 깎아 쓴다' }, { id: 'diffB', answer: '버튼을 눌러 심을 낸다' }], distractors: ['배고플 때 먹는 음식이다', '발에 신는 신발의 종류', '몸을 씻는 세면도구'] },
            { id: 'c6', targets: ['종이책', '전자책'], slots: [{ id: 'common1', answer: '정보를 전달하는 매체이다' }, { id: 'common2', answer: '글과 그림으로 구성되어 있다' }, { id: 'diffA', answer: '종이로 만들어 넘겨 읽는다' }, { id: 'diffB', answer: '전자기기 화면을 통해 읽는다' }], distractors: ['배터리가 없어도 둘 다 작동한다', '음악을 연주하는 악기이다', '옷을 만드는 재료이다'] },
            { id: 'c7', targets: ['육지 생물', '바다 생물'], slots: [{ id: 'common1', answer: '숨을 쉬며 살아간다' }, { id: 'common2', answer: '먹이를 먹고 에너지를 얻는다' }, { id: 'diffA', answer: '땅 위에서 다리로 걷거나 뛴다' }, { id: 'diffB', answer: '물속에서 헤엄치며 생활한다' }], distractors: ['모두 지느러미를 이용해 이동한다', '광합성을 해서 영양분을 만든다', '금속으로 몸이 이루어져 있다'] },
            { id: 'c8', targets: ['안경', '선글라스'], slots: [{ id: 'common1', answer: '눈(얼굴)에 착용하는 도구이다' }, { id: 'common2', answer: '눈을 보호하거나 시력을 돕는다' }, { id: 'diffA', answer: '주로 시력을 교정하기 위해 쓴다' }, { id: 'diffB', answer: '햇빛(자외선)을 차단하기 위해 쓴다' }], distractors: ['발에 신어서 걸어 다닐 때 쓴다', '머리에 쓰고 자는 모자이다', '입술에 바르는 화장품이다'] }
          ]
        };

        const getWaGwa = (word) => {
          if (!word) return '와';
          const lastChar = word.charCodeAt(word.length - 1);
          if (lastChar < 0xAC00 || lastChar > 0xD7A3) return '와';
          return (lastChar - 0xAC00) % 28 > 0 ? '과' : '와';
        };

        function App() {
          const [view, setView] = useState('home'); 
          const [type, setType] = useState(null);
          const [currentQuiz, setCurrentQuiz] = useState(null);
          const [lastQuizId, setLastQuizId] = useState(null);
          const [bank, setBank] = useState([]);
          const [selectedSlot, setSelectedSlot] = useState(null);
          const [answers, setAnswers] = useState({});
          const [feedback, setFeedback] = useState({});

          const audioCtxRef = useRef(null);

          const SKEWER_IMG = "https://raw.githubusercontent.com/SSERAKIM/k-cook-word-game/refs/heads/main/cookgame_01.png";
          const SHABU_IMG = "https://raw.githubusercontent.com/SSERAKIM/k-cook-word-game/refs/heads/main/cookgame_02.png";

          const PINK_COLOR = '#FF1E8D';
          const BLUE_COLOR = '#3B82F6';
          const ORANGE_COLOR = '#FF7D00';
          const SKEWER_BROWN = '#8B4513';

          const currentPointColor = type === 'enumeration' ? PINK_COLOR : BLUE_COLOR;

          // --- 8-bit 오디오 엔진 ---
          const play8BitSound = (soundType) => {
            try {
              if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
              const ctx = audioCtxRef.current;
              if (ctx.state === 'suspended') ctx.resume();
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.connect(gain); gain.connect(ctx.destination);
              const now = ctx.currentTime;

              switch(soundType) {
                case 'startGame':
                  osc.type = 'square'; osc.frequency.setValueAtTime(330, now); osc.frequency.setValueAtTime(440, now + 0.05); osc.frequency.setValueAtTime(660, now + 0.1);
                  gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                  osc.start(now); osc.stop(now + 0.2); break;
                case 'selectSlot':
                  osc.type = 'triangle'; osc.frequency.setValueAtTime(880, now);
                  gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                  osc.start(now); osc.stop(now + 0.1); break;
                case 'selectOption':
                  osc.type = 'square'; osc.frequency.setValueAtTime(440, now);
                  gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                  osc.start(now); osc.stop(now + 0.05); break;
                case 'correct':
                  osc.type = 'square'; osc.frequency.setValueAtTime(523.25, now); osc.frequency.setValueAtTime(659.25, now + 0.07); osc.frequency.setValueAtTime(783.99, now + 0.14);
                  gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                  osc.start(now); osc.stop(now + 0.4); break;
                case 'wrong':
                  osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, now); osc.frequency.exponentialRampToValueAtTime(110, now + 0.3);
                  gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                  osc.start(now); osc.stop(now + 0.3); break;
                case 'fanfare':
                  osc.type = 'square';
                  [523.25, 523.25, 659.25, 783.99, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                    osc.frequency.setValueAtTime(freq, now + i * 0.12);
                  });
                  gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 1.0);
                  osc.start(now); osc.stop(now + 1.0); break;
              }
            } catch (e) {}
          };

          useEffect(() => { if (view === 'success') play8BitSound('fanfare'); }, [view]);

          const initQuiz = (quizType) => {
            play8BitSound('startGame');
            const questions = QUIZ_DATA[quizType];
            let availableQuestions = questions.length > 1 ? questions.filter(q => q.id !== lastQuizId) : questions;
            const quiz = availableQuestions[Math.floor(Math.random() * availableQuestions.length)];
            const options = [...quiz.slots.map(s => s.answer), ...quiz.distractors].sort(() => Math.random() - 0.5);
            setLastQuizId(quiz.id); setType(quizType); setCurrentQuiz(quiz); setBank(options); setAnswers({}); setFeedback({}); setSelectedSlot(null); setView('quiz');
          };

          const handleSlotClick = (slotId) => { if (feedback[slotId] !== 'correct') { play8BitSound('selectSlot'); setSelectedSlot(slotId); } };

          const handleWordSelect = (word) => {
            if (!selectedSlot) return;
            play8BitSound('selectOption');
            const targetWord = word.trim();
            let isCorrect = false;
            const isAlreadyUsed = Object.values(answers).some(a => a.trim() === targetWord);

            if (type === 'enumeration') {
              isCorrect = currentQuiz.slots.map(s => s.answer.trim()).includes(targetWord);
            } else {
              if (selectedSlot.startsWith('common')) {
                isCorrect = currentQuiz.slots.filter(s => s.id.startsWith('common')).map(s => s.answer.trim()).includes(targetWord);
              } else {
                const specificSlot = currentQuiz.slots.find(s => s.id === selectedSlot);
                isCorrect = specificSlot && (specificSlot.answer.trim() === targetWord);
              }
            }

            if (isCorrect && !isAlreadyUsed) {
              play8BitSound('correct');
              const newAnswers = { ...answers, [selectedSlot]: word };
              setAnswers(newAnswers); setFeedback(prev => ({ ...prev, [selectedSlot]: 'correct' })); setSelectedSlot(null);
              if (Object.keys(newAnswers).length === currentQuiz.slots.length) setTimeout(() => setView('success'), 800);
            } else {
              play8BitSound('wrong'); setFeedback(prev => ({ ...prev, [selectedSlot]: 'wrong' }));
              setTimeout(() => setFeedback(prev => ({ ...prev, [selectedSlot]: null })), 800);
            }
          };

          const getSlotStyle = (slotId) => {
            if (feedback[slotId] === 'correct') return 'border-green-600 bg-white/95 shadow-inner';
            if (feedback[slotId] === 'wrong') return 'border-red-600 bg-red-50/90 animate-shake';
            if (selectedSlot === slotId) return 'border-4 bg-white/95 shadow-2xl z-50 scale-105';
            return 'border-black bg-white/75 backdrop-blur-sm hover:bg-white/95';
          };
          
          const getSlotBorder = (slotId) => {
            if (feedback[slotId] === 'correct') return '#16A34A';
            if (feedback[slotId] === 'wrong') return '#DC2626';
            return selectedSlot === slotId ? currentPointColor : '#000000';
          };

          return (
            <div className="min-h-screen bg-white text-slate-900 flex flex-col items-center select-none overflow-x-hidden pb-4">
              {view !== 'success' && (
                <nav className="w-full px-4 sm:px-6 py-2 bg-white border-b-2 border-slate-900 flex justify-between items-center max-w-6xl sticky top-0 z-[100] shadow-sm">
                  <div className="flex items-center gap-2 sm:gap-4 cursor-pointer" onClick={() => setView('home')}>
                    <div className="text-2xl sm:text-3xl">👨‍🍳</div>
                    <div className="flex flex-col">
                      <h1 className="text-base sm:text-lg tracking-tight uppercase leading-none font-bold">낱말 요리 타이쿤</h1>
                      {view === 'quiz' && <div className="text-[10px] sm:text-[12px] mt-0.5 font-bold" style={{ color: currentPointColor }}>{type === 'enumeration' ? '산적꼬치' : '샤브샤브'}</div>}
                    </div>
                  </div>
                  {view === 'quiz' && (
                    <button onClick={() => setView('home')} className="px-3 py-1 sm:px-4 sm:py-2 bg-slate-100 border border-slate-900 text-[12px] sm:text-[14px] hover:bg-white active:translate-y-0.5 transition-all font-bold">
                      뒤로가기
                    </button>
                  )}
                </nav>
              )}

              {view === 'home' && (
                <div className="flex-1 flex flex-col items-center justify-center p-4 text-center w-full max-w-4xl animate-in fade-in duration-500">
                  <div className="mb-4 flex justify-center"><img src="https://media.tenor.com/MfpEA0u1yYgAAAAj/9.gif" alt="Chef" className="w-[100px] h-[100px] sm:w-[140px] sm:h-[140px] object-contain" /></div>
                  <h2 className="text-xl sm:text-2xl md:text-3xl mb-8 sm:mb-12 leading-tight tracking-tighter font-bold">
                    <span style={{ color: ORANGE_COLOR }}>글의 구조</span> 요리 게임<br/>재료를 모아 요리를 완성해요!
                  </h2>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 sm:gap-10 w-full px-4 max-w-3xl mb-8">
                    <button onClick={() => initQuiz('enumeration')} className="bg-white p-6 sm:p-8 transition-all group flex flex-col items-center active:scale-95 border-4 border-[#111111] hover:border-[#FF1E8D]">
                      <div className="text-5xl sm:text-6xl mb-4 group-hover:scale-110 transition-transform">🍢</div>
                      <h3 className="text-lg sm:text-xl mb-2 font-bold">산적꼬치 요리</h3>
                      <p className="text-[12px] sm:text-[14px] mb-3 uppercase tracking-tighter font-bold" style={{ color: PINK_COLOR }}>[ 열거 구조 ]</p>
                      <p className="text-slate-500 text-[10px] sm:text-xs font-bold">재료를 하나씩 콕콕!</p>
                    </button>
                    <button onClick={() => initQuiz('comparison')} className="bg-white p-6 sm:p-8 transition-all group flex flex-col items-center active:scale-95 border-4 border-[#111111] hover:border-[#3B82F6]">
                      <div className="text-5xl sm:text-6xl mb-4 group-hover:scale-110 transition-transform">🥘</div>
                      <h3 className="text-lg sm:text-xl mb-2 font-bold">샤브샤브 요리</h3>
                      <p className="text-[12px] sm:text-[14px] mb-3 uppercase tracking-tighter font-bold" style={{ color: BLUE_COLOR }}>[ 비교와 대조 ]</p>
                      <p className="text-slate-500 text-[10px] sm:text-xs font-bold">공통점과 차이점을 담아요.</p>
                    </button>
                  </div>
                </div>
              )}

              {view === 'quiz' && currentQuiz && (
                <div className="flex-1 w-full max-w-[1200px] px-2 sm:px-6 py-4 flex flex-col items-center">
                  
                  <div className="w-full max-w-[900px] flex flex-col sm:flex-row items-center justify-between gap-2 mb-4 z-[60]">
                    <div className="flex items-center gap-2 bg-white border-2 border-slate-900 py-1.5 px-3 sm:px-5 text-sm font-bold shadow-sm">
                      <span className="animate-bounce">👉</span> 빈 칸 누르고 재료를 골라주세요!
                    </div>
                    <div className="border-2 border-slate-900 px-4 py-1.5 flex items-center gap-2 text-white shadow-sm font-bold responsive-text-base text-center break-keep" style={{ backgroundColor: currentPointColor }}>
                      <span>🔥</span> 
                      주문: {type === 'enumeration' ? (currentQuiz ? currentQuiz.topic : '') : `${currentQuiz && currentQuiz.targets ? currentQuiz.targets[0] : ''}${getWaGwa(currentQuiz && currentQuiz.targets ? currentQuiz.targets[0] : '')} ${currentQuiz && currentQuiz.targets ? currentQuiz.targets[1] : ''} 비교`}
                    </div>
                  </div>

                  <div className="w-full border-2 border-slate-900 rounded-xl overflow-hidden shadow-sm relative" style={{ maxWidth: '900px', backgroundColor: '#f8fafc' }}>
                    
                    <div className="absolute top-[3%] left-1/2 -translate-x-1/2 px-6 sm:px-10 py-1.5 sm:py-2.5 border-2 text-white text-title font-bold rounded-full shadow-md z-[60] whitespace-nowrap" style={{ backgroundColor: SKEWER_BROWN, borderColor: SKEWER_BROWN }}>
                      {type === 'enumeration' ? (currentQuiz ? currentQuiz.topic : '') : `${currentQuiz && currentQuiz.targets ? currentQuiz.targets[0] : ''} vs ${currentQuiz && currentQuiz.targets ? currentQuiz.targets[1] : ''}`}
                    </div>

                    <div className="game-board">
                      {type === 'enumeration' ? (
                        <React.Fragment>
                          <img src={SKEWER_IMG} alt="Skewer" className="game-bg bg-skewer" />
                          <div className="absolute top-[42%] left-0 w-full flex justify-center gap-[2%] z-50 px-2">
                            {currentQuiz.slots.map((slot) => (
                              <button key={slot.id} onClick={() => handleSlotClick(slot.id)} 
                                className={`slot-btn skewer-slot rounded-xl ${getSlotStyle(slot.id)}`} 
                                style={{ borderColor: getSlotBorder(slot.id) }}>
                                {feedback[slot.id] === 'correct' && <span className="mb-0 text-sm sm:text-xl font-bold text-green-600 leading-none">⭐</span>}
                                <span className="text-slot font-bold px-1 mt-1 break-keep" style={{ color: answers[slot.id] ? '#0F172A' : SKEWER_BROWN }}>{answers[slot.id] || "빈 칸"}</span>
                              </button>
                            ))}
                          </div>
                        </React.Fragment>
                      ) : (
                        <React.Fragment>
                          <img src={SHABU_IMG} alt="Shabu" className="game-bg bg-shabu" />
                          
                          <div className="absolute top-[16%] left-1/2 -translate-x-1/2 w-[24%] flex flex-col items-center z-50">
                            <div className="px-4 py-0.5 sm:py-1 border-2 border-black text-white text-label font-bold rounded-full shadow-sm bg-blue-500 mb-[4%] whitespace-nowrap">공통점</div>
                            <div className="flex flex-col gap-2 w-full">
                              {['common1', 'common2'].map(sid => (
                                <button key={sid} onClick={() => handleSlotClick(sid)} 
                                  className={`slot-btn w-full aspect-[5/2] rounded-lg sm:rounded-xl ${getSlotStyle(sid)}`}
                                  style={{ borderColor: getSlotBorder(sid) }}>
                                  <span className="text-slot font-bold px-1" style={{ color: answers[sid] ? '#0F172A' : SKEWER_BROWN }}>{answers[sid] || "빈 칸"}</span>
                                </button>
                              ))}
                            </div>
                          </div>

                          <div className="absolute top-[35%] left-[16%] w-[20%] flex flex-col items-center z-50">
                            <div className="px-4 py-0.5 sm:py-1 border-2 border-black text-white text-label font-bold rounded-full shadow-sm bg-blue-500 mb-[6%] whitespace-nowrap">{currentQuiz && currentQuiz.targets ? currentQuiz.targets[0] : ''}</div>
                            <button onClick={() => handleSlotClick('diffA')} 
                              className={`slot-btn w-full aspect-[4/3] rounded-lg sm:rounded-xl ${getSlotStyle('diffA')}`}
                              style={{ borderColor: getSlotBorder('diffA') }}>
                              <span className="text-slot font-bold px-1" style={{ color: answers['diffA'] ? '#0F172A' : SKEWER_BROWN }}>{answers['diffA'] || "빈 칸"}</span>
                            </button>
                          </div>

                          <div className="absolute top-[35%] right-[16%] w-[20%] flex flex-col items-center z-50">
                            <div className="px-4 py-0.5 sm:py-1 border-2 border-black text-white text-label font-bold rounded-full shadow-sm bg-blue-500 mb-[6%] whitespace-nowrap">{currentQuiz && currentQuiz.targets ? currentQuiz.targets[1] : ''}</div>
                            <button onClick={() => handleSlotClick('diffB')} 
                              className={`slot-btn w-full aspect-[4/3] rounded-lg sm:rounded-xl ${getSlotStyle('diffB')}`}
                              style={{ borderColor: getSlotBorder('diffB') }}>
                              <span className="text-slot font-bold px-1" style={{ color: answers['diffB'] ? '#0F172A' : SKEWER_BROWN }}>{answers['diffB'] || "빈 칸"}</span>
                            </button>
                          </div>
                        </React.Fragment>
                      )}
                    </div>
                  </div>

                  <div className="w-full max-w-[900px] bg-white p-3 sm:p-5 border-2 border-slate-900 mt-4 shadow-sm relative">
                    <div className="absolute top-0 left-0 w-full h-1 border-b border-slate-900" style={{ backgroundColor: currentPointColor }}></div>
                    <div className="flex items-center gap-2 mb-3 relative z-10 font-bold">
                      <span className="text-xl sm:text-2xl">🧺</span>
                      <span className="text-[12px] sm:text-[14px] uppercase tracking-tighter text-slate-700">신선한 재료 바구니</span>
                    </div>
                    <div className="flex flex-wrap gap-2 justify-center py-1 relative z-10">
                      {bank.map((word, i) => {
                        const isUsed = Object.values(answers).includes(word);
                        return (
                          <button key={i} onClick={() => handleWordSelect(word)} disabled={isUsed} 
                            className={`px-3 py-1.5 sm:px-4 sm:py-2 text-[13px] sm:text-[15px] transition-all border-2 border-slate-900 font-bold rounded shadow-sm
                            ${isUsed ? 'opacity-0 scale-50 pointer-events-none absolute' : 'bg-white hover:bg-slate-50 active:scale-95 hover:-translate-y-0.5'}`} 
                            style={{ borderColor: isUsed ? 'transparent' : '#111111' }}
                            onMouseOver={(e) => { if(!isUsed) e.currentTarget.style.borderColor = currentPointColor; }} 
                            onMouseOut={(e) => { if(!isUsed) e.currentTarget.style.borderColor = '#111111'; }}>
                            {word}
                          </button>
                        );
                      })}
                    </div>
                  </div>

                </div>
              )}

              {view === 'success' && (
                <div className="fixed inset-0 z-[200] bg-white flex flex-col items-center justify-center p-6 animate-in fade-in duration-500 overflow-hidden">
                  <div className="w-full max-w-4xl flex flex-col items-center text-center">
                    <div className="flex gap-4 mb-4">
                      <span className="text-4xl animate-bounce-slow" style={{ animationDelay: '0s' }}>⭐</span>
                      <span className="text-4xl animate-bounce-slow" style={{ animationDelay: '0.2s' }}>⭐</span>
                      <span className="text-4xl animate-bounce-slow" style={{ animationDelay: '0.4s' }}>⭐</span>
                    </div>
                    <div className="mb-6 flex justify-center w-full"><img src="https://img1.daumcdn.net/thumb/R1280x0.fgif/?fname=http://t1.daumcdn.net/brunch/service/user/5ac/image/cpEGqV_FkuNUaH-sGsKHZOyyy64.gif" alt="Celebration" className="w-[160px] sm:w-[200px] h-auto object-contain" /></div>
                    <div className="flex items-center gap-4 mb-8">
                      <span className="text-3xl sm:text-4xl animate-pulse">✨</span>
                      <h2 className="text-4xl sm:text-6xl tracking-tighter uppercase whitespace-nowrap font-bold" style={{ color: currentPointColor }}>요리 완성!</h2>
                      <span className="text-3xl sm:text-4xl animate-pulse">✨</span>
                    </div>
                    <p className="text-slate-600 text-[20px] sm:text-[28px] leading-tight text-center mb-12 font-bold">완벽한 요리가 서빙되었습니다!<br/>손님들이 기뻐하고 있어요!</p>
                    <div className="flex flex-col sm:flex-row gap-4 sm:gap-6 w-full max-w-lg px-4">
                      <button onClick={() => initQuiz(type)} className="flex-1 py-4 sm:py-6 text-white border-2 border-slate-900 active:translate-y-1 transition-all text-xl sm:text-2xl uppercase bg-slate-900 hover:opacity-90 font-bold rounded-lg shadow-sm" style={{ backgroundColor: currentPointColor }}>다음 주문 받기!</button>
                      <button onClick={() => setView('home')} className="flex-1 py-4 sm:py-6 text-slate-600 border-2 border-slate-300 hover:text-slate-900 hover:border-slate-900 transition-all text-lg sm:text-xl uppercase bg-slate-50 font-bold rounded-lg shadow-sm">메뉴판으로 가기</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
